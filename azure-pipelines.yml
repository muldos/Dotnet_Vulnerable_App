# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
# Add steps that run tests, create a NuGet package, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- main

pool:
  name: 'my-pool'

variables:
  buildConfiguration: 'Release'
  trivySeverity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

steps:

# - task: UseDotNet@2
#   displayName: 'Use .NET SDK 9.x'
#   inputs:
#     packageType: sdk
#     version: '9.x'

- script: dotnet build --configuration $(buildConfiguration)
  displayName: 'dotnet build $(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: 'Publish the project - Release'
  inputs:
    command: 'publish'
    projects: '**/*.csproj'
    publishWebProjects: false
    arguments: '--no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/$(buildConfiguration)'
    zipAfterPublish: true

- script: sbom-tool generate -b $(Build.ArtifactStagingDirectory)/$(buildConfiguration) -bc . -pn "MyConsoleApp" -pv "1.0.0" -ps "Evidente" -nsb "https://evidente.se/sbom" -pm
  displayName: 'Generate SBOM'

# Run Trivy on the SBOM and exit with code 1 if any securoty issues are found
- script: |
    trivy sbom --severity $(trivySeverity) --format table --output $(Build.ArtifactStagingDirectory)/trivy-report.txt --exit-code 1 $(Build.ArtifactStagingDirectory)\$(buildConfiguration)\_manifest\spdx_2.2\manifest.spdx.json 
    if %ERRORLEVEL% NEQ 0 (
      echo ##vso[task.logissue type=error]Vulnerabilities were found during the Trivy scan.
      echo ##vso[task.complete result=Failed]
      exit 1
    )
  displayName: 'Scan SBOM with Trivy'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Trivy report'
  condition: failed()  
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/trivy-report.txt'
    ArtifactName: 'TrivyReport'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  condition: succeeded()
